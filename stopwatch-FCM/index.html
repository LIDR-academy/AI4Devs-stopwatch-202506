<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cronos</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Animate.css for shake effect -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 font-sans">

  <div class="container mx-auto p-4">
    <header class="flex items-center justify-between mb-4">
      <div class="h-8 w-8 bg-black text-white flex items-center justify-center font-bold">L1</div>
      <div class="text-gray-700 text-sm text-right">
        Hoy es: <span id="date-display"></span><br>
        Hora actual: <span id="time-display"></span>
      </div>
    </header>

    <main class="flex flex-col md:flex-row bg-white rounded-lg shadow-lg overflow-hidden">
      <!-- Left Panel -->
      <div class="w-full md:w-1/3 p-4">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Cronos</h1>
        <p class="text-gray-600 mb-4">Tu Cronómetro y Cuenta Regresiva OnLine</p>

        <div id="time-input-section" class="mb-4 hidden">
          <label class="block text-gray-700 mb-2">Indica el tiempo deseado:</label>
          <div id="time-inputs" class="flex space-x-2">
            <input type="number" id="in-hours" class="input-time" placeholder="HH" min="0">
            <input type="number" id="in-minutes" class="input-time" placeholder="MM" min="0" max="59">
            <input type="number" id="in-seconds" class="input-time" placeholder="SS" min="0" max="59">
          </div>
        </div>

        <div class="flex space-x-2">
          <button id="btn-stopwatch" class="btn-primary">CRONOMETRO</button>
          <button id="btn-countdown" class="btn-secondary">CUENTA REGRESIVA</button>
        </div>
      </div>

      <!-- Right Panel -->
      <div class="w-full md:w-2/3 p-4">
        <div class="bg-gray-200 h-40 rounded-t-lg flex items-center justify-center">
          <button id="btn-play-pause" class="material-icons text-6xl text-gray-600 select-none">play_arrow</button>
        </div>

        <div class="bg-white p-4 rounded-b-lg shadow flex flex-col items-center">
          <div class="flex space-x-2 mb-4">
            <div id="disp-hours" class="time-box">00</div>
            <div id="disp-minutes" class="time-box">00</div>
            <div id="disp-seconds" class="time-box">00</div>
            <div id="disp-ms" class="time-box w-20">000</div>
          </div>
          <div class="flex space-x-2">
            <button id="btn-reset" class="btn-reset">REINICIAR</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <audio id="alarm-sound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_b3958c5fa5.mp3" preload="auto"></audio>
  <script src="script.js"></script>
</body>
</html>
