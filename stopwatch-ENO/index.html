<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch & Countdown</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
  <div class="container text-center" id="app">
    <!-- Home Page -->
    <div id="home" class="d-flex justify-content-center gap-5">
      <div id="stopwatchBtn" class="select-box">
        <img src="https://img.icons8.com/emoji/96/000000/up-arrow-emoji.png" alt="Stopwatch">
        <p>Stopwatch</p>
      </div>
      <div id="countdownBtn" class="select-box">
        <img src="https://img.icons8.com/emoji/96/000000/down-arrow-emoji.png" alt="Countdown">
        <p>Countdown</p>
      </div>
    </div>

    <!-- Stopwatch Interface -->
    <div id="stopwatch" class="d-none">
      <h1 id="stopwatchDisplay">00:00:00.000</h1>
      <div class="d-flex justify-content-center gap-3">
        <button class="btn btn-success" id="startStopwatch">Start</button>
        <button class="btn btn-danger" id="clearStopwatch">Clear</button>
      </div>
      <button class="btn btn-link mt-3" id="backFromStopwatch">← Back</button>
    </div>

    <!-- Countdown Interface -->
    <div id="countdown" class="d-none">
      <h1 id="countdownDisplay">00:00:00.000</h1>
      <div class="d-flex flex-wrap justify-content-center gap-2 my-3">
        <!-- Number pad -->
        <div class="d-flex flex-wrap gap-2" style="max-width: 240px">
          <button class="btn btn-success number-key">1</button>
          <button class="btn btn-success number-key">2</button>
          <button class="btn btn-success number-key">3</button>
          <button class="btn btn-success number-key">4</button>
          <button class="btn btn-success number-key">5</button>
          <button class="btn btn-success number-key">6</button>
          <button class="btn btn-success number-key">7</button>
          <button class="btn btn-success number-key">8</button>
          <button class="btn btn-success number-key">9</button>
          <button class="btn btn-success number-key">0</button>
          <button class="btn btn-primary" id="setCountdown">Set</button>
          <button class="btn btn-secondary" id="clearCountdown">Clear</button>
        </div>
      </div>
      <button class="btn btn-link mt-2" id="backFromCountdown">← Back</button>
    </div>
  </div>
</body>
</html>
