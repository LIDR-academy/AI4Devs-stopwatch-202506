<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer & Countdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .timer-display {
            font-size: 4rem;
            background-color: #eef;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-lg {
            font-size: 1.5rem;
            padding: 15px 30px;
        }
        .section {
            margin-bottom: 60px;
        }
    </style>
</head>
<body class="container py-5">
    <h1 class="text-center mb-5">Stopwatch and Countdown Timer</h1>

    <div class="section" id="stopwatch-section">
        <h2 class="text-center">Stopwatch</h2>
        <div id="stopwatch-display" class="timer-display">00:00:00</div>
        <div class="d-flex justify-content-center gap-3">
            <button id="stopwatch-start" class="btn btn-success btn-lg">Start</button>
            <button id="stopwatch-clear" class="btn btn-danger btn-lg">Clear</button>
        </div>
    </div>

    <div class="section" id="countdown-section">
        <h2 class="text-center">Countdown</h2>
        <div id="countdown-display" class="timer-display">00:00:00</div>
        <div class="d-flex justify-content-center mb-3 flex-column align-items-center">
            <label for="countdown-input" class="form-label">Enter seconds</label>
            <input type="number" id="countdown-input" class="form-control w-25 text-center" placeholder="Enter seconds">
        </div>
        <div class="d-flex justify-content-center gap-3">
            <button id="countdown-start" class="btn btn-success btn-lg">Start</button>
            <button id="countdown-clear" class="btn btn-danger btn-lg">Clear</button>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
