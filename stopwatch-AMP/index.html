<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch & Countdown</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center">
<div class="w-full max-w-4xl flex flex-col items-center">
  <!-- Toggle Switch -->
  <div class="flex items-center mb-6">
    <span id="label-stopwatch" class="mr-2 font-semibold text-xl">Stopwatch</span>
    <label class="relative inline-flex items-center cursor-pointer">
      <input type="checkbox" id="mode-toggle" class="sr-only peer">
      <div class="w-16 h-8 bg-gray-300 peer-focus:outline-none peer-focus:ring-2 peer-focus:ring-blue-500 rounded-full peer peer-checked:bg-blue-600 transition-all"></div>
      <span class="absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-all peer-checked:translate-x-8"></span>
    </label>
    <span id="label-countdown" class="ml-2 font-semibold text-xl">Countdown</span>
  </div>

  <!-- Time Display -->
  <div class="bg-blue-100 border-4 border-gray-700 rounded-3xl px-8 py-4 mb-8 w-full flex flex-col items-end relative" style="min-width: 600px;">
    <div id="time-display" class="text-black text-[8vw] font-mono font-bold w-full text-center select-none leading-none">00:00:00</div>
    <div id="ms-display" class="text-black text-3xl font-mono absolute bottom-2 right-8 select-none">000</div>
  </div>

  <!-- Quick Selectors (hidden by default, shown in countdown mode) -->
  <div id="quick-selectors" class="flex flex-wrap justify-center gap-4 mb-8 hidden">
    <button class="bg-gray-200 hover:bg-gray-300 text-xl font-bold px-4 py-2 rounded-lg" data-minutes="1">+1 min</button>
    <button class="bg-gray-200 hover:bg-gray-300 text-xl font-bold px-4 py-2 rounded-lg" data-minutes="5">+5 min</button>
    <button class="bg-gray-200 hover:bg-gray-300 text-xl font-bold px-4 py-2 rounded-lg" data-seconds="10">+10 sec</button>
    <button class="bg-gray-200 hover:bg-gray-300 text-xl font-bold px-4 py-2 rounded-lg" data-seconds="30">+30 sec</button>
    <button class="bg-gray-200 hover:bg-gray-300 text-xl font-bold px-4 py-2 rounded-lg" data-reset="true">Reset</button>
  </div>

  <!-- Controls -->
  <div class="flex justify-center gap-12 w-full">
    <button id="start-btn" class="bg-green-500 hover:bg-green-600 text-white text-4xl font-bold px-16 py-6 rounded-2xl border-4 border-gray-700 shadow-lg transition-all">Start</button>
    <button id="clear-btn" class="bg-red-600 hover:bg-red-700 text-white text-4xl font-bold px-16 py-6 rounded-2xl border-4 border-gray-700 shadow-lg transition-all">Clear</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
