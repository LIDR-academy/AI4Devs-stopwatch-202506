<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch and Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --display-bg: #e0e0f0;
            --text-color: #e94560;
            --button-green: #0f0;
            --button-red: #f00;
            --button-blue: #03a9f4;
            --font-digital: 'Orbitron', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 10px; /* Añade un poco de espacio en los bordes */
        }

        .container {
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(233, 69, 96, 0.4);
            border: 1px solid var(--text-color);
            width: 100%; /* Ocupa todo el ancho disponible */
            max-width: 500px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 20px;
            font-family: var(--font-digital);
            text-shadow: 0 0 10px var(--text-color);
        }

        .options-menu .option {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--button-blue);
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.5em;
            font-family: var(--font-digital);
        }

        .options-menu .option:hover {
            background: var(--button-blue);
            color: var(--container-bg);
            box-shadow: 0 0 15px var(--button-blue);
        }

        .arrow {
            font-size: 1.2em;
            margin-right: 15px;
        }

        .timer-display-container {
            background-color: var(--display-bg);
            color: black;
            font-family: var(--font-digital);
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            border: 4px solid #333;
        }

        .timer-display {
            font-size: 4.5em;
            letter-spacing: 2px; /* Reducido para mejor ajuste */
            word-break: break-all;
        }

        .milliseconds {
            font-size: 1.5em;
            color: #555;
            display: block;
            text-align: right;
            margin-right: 10px;
        }

        .buttons-container {
            display: flex;
            justify-content: space-around;
            gap: 10px; /* Añade un espacio entre los botones */
            margin-top: 25px;
        }

        /* --- ESTILOS AJUSTADOS PARA BOTONES --- */
        button {
            font-family: var(--font-digital);
            font-size: 1.4em; /* Ligeramente más pequeño */
            padding: 12px 20px; /* Acolchado reducido */
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            min-width: 130px; /* Ancho mínimo reducido */
            flex-grow: 1; /* Permite que los botones crezcan */
            flex-basis: 0; /* Base flexible para una distribución uniforme */
        }

        .btn-start { background-color: var(--button-green); box-shadow: 0 0 10px var(--button-green); }
        .btn-stop { background-color: var(--button-red); box-shadow: 0 0 10px var(--button-red); }
        .btn-clear { background-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        .btn-set { background-color: var(--button-blue); box-shadow: 0 0 10px var(--button-blue); }
        
        .btn-back { 
            background-color: #6c757d; 
            font-size: 1em; 
            padding: 10px 18px; 
            min-width: auto; /* El botón "Atrás" no necesita un ancho mínimo grande */
            margin-top: 20px; 
            flex-grow: 0; /* Evita que el botón "Atrás" se estire */
        }
        
        button:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        #keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 300px;
        }

        #keypad button {
            background-color: #4a4a4a;
            font-size: 1.8em;
            padding: 20px;
            min-width: auto;
        }

        #keypad .zero {
            grid-column: 2;
        }

        /* --- Media Query para pantallas pequeñas (móviles) --- */
        @media (max-width: 480px) {
            .timer-display {
                font-size: 3.2em; /* Reducir el texto del temporizador */
            }
            .milliseconds {
                font-size: 1.2em;
            }
            .options-menu .option {
                font-size: 1.2em; /* Reducir texto del menú */
                padding: 15px;
            }
            .buttons-container button, button {
                font-size: 1.1em; /* Reducir texto de botones */
                padding: 12px 10px; /* Reducir acolchado */
                min-width: 100px; /* Reducir ancho mínimo */
            }
            #keypad button {
                font-size: 1.5em;
                padding: 15px;
            }
        }

    </style>
</head>
<body>

    <div class="container">
        <!-- Pantalla de Inicio -->
        <div id="homeScreen" class="screen active">
            <h1>Stopwatch & Countdown</h1>
            <div class="options-menu">
                <div id="selectStopwatch" class="option">
                    <span class="arrow">▲</span> Stopwatch
                </div>
                <div id="selectCountdown" class="option">
                    <span class="arrow">▼</span> Countdown
                </div>
            </div>
        </div>

        <!-- Pantalla del Cronómetro -->
        <div id="stopwatchScreen" class="screen">
            <h1>Stopwatch</h1>
            <div class="timer-display-container">
                <div id="stopwatchDisplay" class="timer-display">00:00:00</div>
                <div id="stopwatchMilliseconds" class="milliseconds">000</div>
            </div>
            <div class="buttons-container">
                <button id="stopwatchStartStop" class="btn-start">Start</button>
                <button id="stopwatchClear" class="btn-clear">Clear</button>
            </div>
            <button class="back-button" data-target="home">Atrás</button>
        </div>

        <!-- Pantalla de Cuenta Atrás -->
        <div id="countdownScreen" class="screen">
            <h1>Countdown</h1>
            <div class="timer-display-container">
                <div id="countdownDisplay" class="timer-display">00:00:00</div>
                <div id="countdownMilliseconds" class="milliseconds">000</div>
            </div>

            <!-- Vista de configuración -->
            <div id="countdownSetup">
                <div id="keypad">
                    <button data-key="1">1</button>
                    <button data-key="2">2</button>
                    <button data-key="3">3</button>
                    <button data-key="4">4</button>
                    <button data-key="5">5</button>
                    <button data-key="6">6</button>
                    <button data-key="7">7</button>
                    <button data-key="8">8</button>
                    <button data-key="9">9</button>
                    <button data-key="0" class="zero">0</button>
                </div>
                <div class="buttons-container">
                    <button id="countdownSet" class="btn-set">Set</button>
                    <button id="countdownClearInput" class="btn-clear">Clear</button>
                </div>
            </div>
            
            <!-- Vista del temporizador en marcha -->
            <div id="countdownTimer" style="display: none;">
                <div class="buttons-container">
                    <button id="countdownStartStop" class="btn-start">Start</button>
                    <button id="countdownClearTimer" class="btn-clear">Clear</button>
                </div>
            </div>
            
            <button class="back-button" data-target="home">Atrás</button>
        </div>
    </div>

    <!-- Elemento de audio para la alarma -->
    <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
