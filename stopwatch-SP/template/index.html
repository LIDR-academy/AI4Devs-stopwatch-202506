<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer and Countdown</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <div class="display" id="time-display">
    00:00:00 <span class="ms">000</span>
  </div>
  <div class="controls">
    <button id="start-btn" class="btn start">Start</button>
    <button id="clear-btn" class="btn clear">Clear</button>
  </div>
  <div class="mode-switch">
    <button id="mode-stopwatch" class="mode active">Cronómetro</button>
    <button id="mode-timer" class="mode">Cuenta atrás</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
